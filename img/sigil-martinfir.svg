<svg viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg"
     fill="none" stroke="#34b3bd" stroke-linecap="round" stroke-linejoin="round">
  <!-- bounding circle -->
  <circle cx="100" cy="105" r="95" stroke-width="1.2"/>
  <!-- compass ticks -->
  <line x1="195" y1="105" x2="187" y2="105" stroke-width="1.5"/>
  <line x1="5"   y1="105" x2="13"  y2="105" stroke-width="1.5"/>
  <line x1="167" y1="38"  x2="162" y2="43"  stroke-width="1.5"/>
  <line x1="167" y1="172" x2="162" y2="167" stroke-width="1.5"/>
  <line x1="33"  y1="172" x2="38"  y2="167" stroke-width="1.5"/>
  <line x1="33"  y1="38"  x2="38"  y2="43"  stroke-width="1.5"/>
  <!-- spine -->
  <line x1="100" y1="10"  x2="100" y2="200" stroke-width="1.5"/>
  <!-- eye at apex -->
  <path d="M 76,33 A 27,27 0 0,1 124,33" stroke-width="1.2"/>
  <path d="M 76,33 A 27,27 0 0,0 124,33" stroke-width="1"/>
  <!-- chevron (M) -->
  <path d="M 48,70 L 100,22 L 152,70" stroke-width="1.5"/>
  <!-- crossbar (T) -->
  <line x1="24"  y1="70"  x2="176" y2="70"  stroke-width="1.2"/>
  <!-- arms (N) -->
  <line x1="24"  y1="70"  x2="60"  y2="118" stroke-width="1"/>
  <line x1="176" y1="70"  x2="140" y2="118" stroke-width="1"/>
  <!-- diamond lozenge -->
  <path d="M 100,111 L 107,118 L 100,125 L 93,118 Z" stroke-width=".9"/>
  <!-- mid crossbar (F) -->
  <line x1="60"  y1="118" x2="140" y2="118" stroke-width="1"/>
  <!-- lower convergence -->
  <line x1="60"  y1="118" x2="100" y2="188" stroke-width="1"/>
  <line x1="140" y1="118" x2="100" y2="188" stroke-width="1"/>
  <!-- nodes -->
  <circle cx="100" cy="22"  r="3.5" fill="#34b3bd" stroke="none"/>
  <circle cx="100" cy="70"  r="2.5" fill="#34b3bd" stroke="none"/>
  <circle cx="100" cy="118" r="2.5" fill="#34b3bd" stroke="none"/>
  <circle cx="100" cy="188" r="3"   fill="#34b3bd" stroke="none"/>
  <circle cx="24"  cy="70"  r="2"   fill="#34b3bd" stroke="none"/>
  <circle cx="176" cy="70"  r="2"   fill="#34b3bd" stroke="none"/>
</svg>
