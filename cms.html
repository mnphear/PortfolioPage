<!--
  ============================================================
  MARTIN FIR — local CMS  ·  edits data/projects.json
  Run it the same way as the site (over http, not file://):
      python -m http.server 8000   ->   http://localhost:8000/cms.html

  WHAT IT DOES
    - Loads data/projects.json on open (falls back to empty if missing).
    - Add / delete / reorder projects and their media.
    - Media types: image · video · model (GLB) · compare (before/after wiper).
    - Pick a local file -> it previews instantly and suggests the path
      (img/… or video/… or models/…). You still copy that file into the
      matching folder in your repo, then commit. Static hosting can't write
      files for you — this just keeps names + paths consistent.
    - Live preview mirrors the site's right-hand viewer.
    - "Save projects.json" uses the File System Access API: first click opens a
      file picker (navigate to data/projects.json and confirm), then every
      subsequent save writes directly to that file. The handle is remembered
      in IndexedDB so it persists across page reloads. Falls back to a regular
      download in browsers that don't support the API.
    - Autosaves your working draft to the browser so a refresh won't lose it.
  ============================================================
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fir // CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="gfonts" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b; --panel:#121214; --panel2:#0e0e10; --line:#232327;
    --ink:#e9e7e1; --ink-dim:#8a8880; --ink-faint:#55534d;
    --safe:#34b3bd; --safe-dim:#1d6a70; --bad:#d2503a; --radius:3px;
    --tracking-d: -.02em;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:"IBM Plex Mono",ui-monospace,monospace; font-size:13px;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  h1,h2,h3,.disp{ font-family:"Big Shoulders Display",sans-serif; }

  /* top bar */
  header{
    position:sticky; top:0; z-index:10;
    display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
    padding:.7rem 1.1rem; background:linear-gradient(#0e0e10,#0a0a0b);
    border-bottom:1px solid var(--line);
  }
  header h1{ font-weight:800; letter-spacing:.06em; font-size:1.25rem; text-transform:uppercase; }
  header h1 span{ color:var(--safe); }
  header .spacer{ flex:1; }
  .status{ font-size:.62rem; letter-spacing:.14em; color:var(--ink-faint); text-transform:uppercase; }

  button, .btn{
    font:inherit; font-size:.62rem; letter-spacing:.16em; text-transform:uppercase;
    color:var(--ink); background:#161618; border:1px solid var(--line);
    border-radius:var(--radius); padding:.45rem .7rem; cursor:pointer;
    transition:border-color .15s,color .15s,background .15s;
  }
  button:hover, .btn:hover{ border-color:var(--safe-dim); color:var(--safe); }
  button.primary{ border-color:var(--safe-dim); color:var(--safe); }
  button.primary:hover{ background:#11201f; }
  button.danger:hover{ border-color:var(--bad); color:var(--bad); }
  button.icon{ padding:.3rem .5rem; }

  /* layout */
  .wrap{ display:grid; grid-template-columns:240px 1fr 460px; gap:1px; background:var(--line); min-height:calc(100vh - 49px); }
  .col{ background:var(--bg); padding:1rem; overflow-y:auto; }
  .col h2{ font-size:.6rem; letter-spacing:.3em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:.8rem; font-family:"IBM Plex Mono",monospace; font-weight:600; }
  /* editor tabs */
  .ed-tabs{ display:flex; gap:0; border-bottom:1px solid var(--line); margin:-1rem -1rem .9rem; }
  .ed-tab{
    font:inherit; font-size:.55rem; letter-spacing:.22em; text-transform:uppercase;
    background:none; border:none; border-bottom:2px solid transparent;
    color:var(--ink-faint); padding:.55rem 1rem; cursor:pointer;
    transition:color .15s, border-color .15s;
  }
  .ed-tab:hover{ color:var(--ink); }
  .ed-tab.active{ color:var(--safe); border-bottom-color:var(--safe); }

  /* project list */
  .plist{ display:flex; flex-direction:column; gap:.35rem; }
  .pitem{
    display:flex; align-items:center; gap:.5rem; padding:.5rem .55rem;
    border:1px solid transparent; border-radius:var(--radius); background:#0e0e10; cursor:pointer;
  }
  .pitem:hover{ background:#161618; }
  .pitem.active{ border-color:var(--safe-dim); background:#11201f; }
  .pitem .grab{ color:var(--ink-faint); cursor:grab; font-size:.8rem; }
  .pitem .pt{ flex:1; min-width:0; }
  .pitem .pt b{ display:block; font-family:"Big Shoulders Display",sans-serif; font-size:1rem; letter-spacing:.02em; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pitem.active .pt b{ color:var(--safe); }
  .pitem .pt small{ color:var(--ink-faint); font-size:.55rem; letter-spacing:.1em; }
  .pitem.drop-above{ box-shadow:inset 0 2px 0 var(--safe); }
  .pitem.drop-below{ box-shadow:inset 0 -2px 0 var(--safe); }

  /* editor */
  .field{ margin-bottom:.8rem; }
  .field label{ display:block; font-size:.55rem; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:.3rem; }
  input[type=text], select, textarea{
    width:100%; font:inherit; color:var(--ink); background:var(--panel2);
    border:1px solid var(--line); border-radius:var(--radius); padding:.45rem .55rem;
  }
  input:focus, select:focus, textarea:focus{ outline:none; border-color:var(--safe-dim); }
  .row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:.6rem; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:.6rem; }
  hr{ border:none; border-top:1px solid var(--line); margin:1rem 0; }

  /* media editor */
  .medias{ display:flex; flex-direction:column; gap:.6rem; }
  .media{
    border:1px solid var(--line); border-radius:var(--radius); background:#0e0e10; padding:.7rem;
  }
  .media.drop-above{ box-shadow:inset 0 2px 0 var(--safe); }
  .media.drop-below{ box-shadow:inset 0 -2px 0 var(--safe); }
  .media .mhead{ display:flex; align-items:center; gap:.5rem; margin-bottom:.6rem; }
  .media .mhead .grab{ color:var(--ink-faint); cursor:grab; }
  .media .mhead .tag{ font-size:.5rem; letter-spacing:.18em; text-transform:uppercase; color:var(--safe); border:1px solid var(--safe-dim); padding:.1rem .4rem; border-radius:2px; }
  .media .mhead .spacer{ flex:1; }
  .pick{ display:flex; gap:.4rem; align-items:center; }
  .pick .path{ flex:1; }
  .pick label.filebtn{
    font-size:.55rem; letter-spacing:.14em; text-transform:uppercase; white-space:nowrap;
    border:1px solid var(--line); border-radius:var(--radius); padding:.45rem .6rem; cursor:pointer; color:var(--ink-dim);
  }
  .pick label.filebtn:hover{ color:var(--safe); border-color:var(--safe-dim); }
  .pick input[type=file]{ display:none; }
  .hint{ font-size:.55rem; color:var(--ink-faint); letter-spacing:.06em; margin-top:.3rem; }
  .hint.warn{ color:#caa14a; }

  /* preview viewer (mirrors the site) */
  .pv{ position:sticky; top:1rem; }
  .pv .vhead{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:.6rem; }
  .pv .vtitle{ font-family:"Big Shoulders Display",sans-serif; font-weight:800; font-size:1.6rem; text-transform:uppercase; line-height:.95; letter-spacing:var(--tracking-d); }
  .pv .vsub{ font-size:.55rem; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-dim); margin-top:.25rem; }
  .pv .vyear{ font-size:.55rem; letter-spacing:.18em; color:var(--ink-faint); }
  .pv .vmain{ position:relative; aspect-ratio:16/9; background:#000; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .pv .vmain img, .pv .vmain video{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; }
  .pv .vcap{ position:absolute; left:10px; bottom:8px; font-size:.55rem; letter-spacing:.14em; text-transform:uppercase; background:rgba(0,0,0,.6); padding:.2rem .45rem; border-radius:2px; }
  .pv .tabs{ display:flex; gap:.4rem; margin:.6rem 0; }
  .pv .tab{ font-size:.55rem; }
  .pv .tab.active{ color:var(--safe); border-color:var(--safe-dim); }
  .pv .strip{ display:flex; gap:.4rem; overflow-x:auto; }
  .pv .th{ flex:none; width:84px; height:50px; border:1px solid var(--line); border-radius:2px; overflow:hidden; position:relative; background:#000; cursor:pointer; }
  .pv .th.active{ border-color:var(--safe); }
  .pv .th img, .pv .th video{ width:100%; height:100%; object-fit:cover; }
  .pv .th .b{ position:absolute; top:2px; right:3px; font-size:.45rem; color:var(--safe); background:rgba(0,0,0,.6); padding:0 3px; border-radius:2px; }
  .plate{ position:absolute; inset:0; }
  .plate.green{ background:repeating-linear-gradient(135deg,#00b140 0 14px,#03a23b 14px 28px); }
  .plate.neutral{ background:linear-gradient(135deg,#1a1a1e,#0c0c0d); }
  /* compare slider in preview */
  .cmp{ overflow:hidden; touch-action:none; cursor:ew-resize; }
  .cmp .layer{ position:absolute; inset:0; }
  .cmp .line{ position:absolute; top:0; bottom:0; width:2px; margin-left:-1px; background:var(--safe); }
  .cmp .grip{ position:absolute; top:50%; left:0; transform:translate(-50%,-50%); width:28px; height:28px; border-radius:50%; background:var(--safe); color:#000; display:flex; align-items:center; justify-content:center; font-weight:700; box-shadow:0 0 0 2px #000; }
  .cmp .ct{ position:absolute; bottom:8px; font-size:.5rem; letter-spacing:.18em; background:rgba(0,0,0,.6); padding:.15rem .4rem; border-radius:2px; }
  .cmp .ct.l{ left:8px; } .cmp .ct.r{ right:8px; }

  .files-note{ margin-top:1rem; border:1px solid var(--line); border-radius:var(--radius); padding:.7rem; background:#0e0e10; }
  .files-note h3{ font-size:.55rem; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:.5rem; font-family:"IBM Plex Mono",monospace; }
  .files-note ul{ list-style:none; display:flex; flex-direction:column; gap:.3rem; }
  .files-note li{ font-size:.6rem; color:var(--ink-dim); display:flex; justify-content:space-between; gap:.6rem; }
  .files-note code{ color:var(--safe); }
  .empty{ color:var(--ink-faint); font-size:.65rem; letter-spacing:.06em; padding:1rem 0; }

  /* disciplines palette */
  .disc-section{ margin-bottom:.8rem; }
  .disc-list{ display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.5rem; min-height:1.4rem; }
  .disc-entry{ display:inline-flex; align-items:center; gap:.15rem; }
  .disc-pill-btn{
    display:inline-flex; align-items:center;
    background:var(--pd,#1d6a70); color:var(--pc,#34b3bd); border:1px solid var(--pc,#34b3bd);
    border-radius:2px; padding:.15rem .5rem;
    font:inherit; font-size:.6rem; letter-spacing:.12em; text-transform:uppercase;
    cursor:pointer; white-space:nowrap; transition:filter .12s;
  }
  .disc-pill-btn:hover{ filter:brightness(1.2); }
  .disc-del-btn{
    background:none; border:none; padding:0 .15rem; color:var(--ink-faint);
    cursor:pointer; font-size:.75rem; line-height:1;
  }
  .disc-del-btn:hover{ color:var(--bad); }
  .disc-add-row{ display:flex; gap:.4rem; }
  .disc-add-row input{ flex:1; }

  /* role picker inside project editor */
  .disc-picker{
    display:flex; flex-wrap:wrap; gap:.3rem; align-items:center;
    background:var(--panel2); border:1px solid var(--line); border-radius:var(--radius);
    padding:.3rem .45rem; min-height:34px; cursor:text;
  }
  .disc-picker:focus-within{ border-color:var(--safe-dim); }
  .disc-opt{
    display:inline-flex; align-items:center;
    border-radius:2px; padding:.15rem .5rem; border:1px solid transparent;
    font-size:.6rem; letter-spacing:.12em; text-transform:uppercase;
    cursor:pointer; white-space:nowrap; color:var(--ink-faint); background:#1a1a1e;
    transition:color .12s,background .12s,border-color .12s;
  }
  .disc-opt:hover{ color:var(--ink); border-color:var(--line); }
  .disc-opt.active{
    background:var(--pd,#1d6a70); color:var(--pc,#34b3bd); border-color:var(--pc,#34b3bd);
  }
  .disc-picker input{
    background:none; border:none; color:var(--ink); font:inherit;
    flex:1; min-width:80px; padding:.1rem .2rem;
  }
  .disc-picker input:focus{ outline:none; }

  .crop-tool{ display:flex; flex-direction:column; align-items:center; gap:.35rem; margin-top:.6rem; }
  .crop-circle{
    width:100px; aspect-ratio:4/5; border-radius:8px;
    overflow:hidden; position:relative; background:#111;
    cursor:grab; touch-action:none;
    border:1px solid var(--safe);
  }
  .crop-circle:active{ cursor:grabbing; }
  .crop-circle img{ width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
  .crop-circle .plate{ border-radius:8px; }
  .crop-hint{ font-size:.48rem; letter-spacing:.12em; color:var(--ink-faint); text-transform:uppercase; }

  @media (max-width:1100px){ .wrap{ grid-template-columns:1fr; } .pv{ position:static; } }
</style>
</head>
<body>

<header>
  <h1>Fir <span>//</span> CMS</h1>
  <span class="status" id="status">—</span>
  <span class="spacer"></span>
  <label class="btn" for="loadFile">Load JSON</label>
  <input type="file" id="loadFile" accept="application/json,.json" hidden>
  <button id="copyBtn">Copy JSON</button>
  <button id="exportBtn" class="primary">Save projects.json</button>
  <button id="resetBtn" class="danger">Reset</button>
</header>

<div class="wrap">
  <!-- projects -->
  <div class="col">
    <h2>Projects</h2>
    <div class="plist" id="plist"></div>
    <button id="addProj" style="margin-top:.7rem;width:100%">+ Add project</button>
  </div>

  <!-- editor -->
  <div class="col" id="editor"></div>

  <!-- preview -->
  <div class="col">
    <h2>Live preview</h2>
    <div class="pv" id="preview"></div>
  </div>
</div>

<script>
const CATS = [["stills","Stills"],["bts","BTS"],["breakdown","Breakdown"]];
const TYPES = ["image","video","model","compare"];
const FOLDER = { image:"img", video:"video", model:"models", compare:"img" };
const FONTS = [
  { id:"default",     label:"Big Shoulders + IBM Plex Mono",
    url:"https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
  { id:"bebas-space",  label:"Bebas Neue + Space Mono",
    url:"https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" },
  { id:"barlow-jet",   label:"Barlow Condensed + JetBrains",
    url:"https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=JetBrains+Mono:wght@400;500;600&display=swap" },
  { id:"oswald-fira",  label:"Oswald + Fira Mono",
    url:"https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Fira+Mono:wght@400;500&display=swap" },
  { id:"syne-roboto",  label:"Syne + Roboto Mono",
    url:"https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Roboto+Mono:wght@400;500&display=swap" },
  { id:"russo-space",  label:"Russo One + Space Mono",
    url:"https://fonts.googleapis.com/css2?family=Russo+One&family=Space+Mono:wght@400;700&display=swap" },
  { id:"akira-space",    label:"Akira Expanded + Space Mono", url:null },
  { id:"dela-plex",        label:"Dela Gothic One + IBM Plex",
    url:"https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
  { id:"bodoni-plex",      label:"Bodoni Moda + IBM Plex Mono",
    url:"https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6,900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
  { id:"libre-bodoni-plex",label:"Libre Bodoni + IBM Plex Mono",
    url:"https://fonts.googleapis.com/css2?family=Libre+Bodoni:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
  { id:"anton-plex",       label:"Anton + IBM Plex Mono",
    url:"https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
  { id:"epilogue-plex",    label:"Epilogue Black + IBM Plex Mono",
    url:"https://fonts.googleapis.com/css2?family=Epilogue:wght@800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
  { id:"alfaslab-plex",    label:"Alfa Slab One + IBM Plex Mono",
    url:"https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
  { id:"lilita-plex",      label:"Lilita One + IBM Plex Mono",
    url:"https://fonts.googleapis.com/css2?family=Lilita+One&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
  { id:"montserrat-plex",  label:"Montserrat + IBM Plex Mono",
    url:"https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
  { id:"raleway-plex",     label:"Raleway + IBM Plex Mono",
    url:"https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
  { id:"exo2-plex",        label:"Exo 2 + IBM Plex Mono",
    url:"https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" },
];

const COLORS = [
  {id:"teal",   hex:"#34b3bd", dim:"#1d6a70"},
  {id:"amber",  hex:"#c9913a", dim:"#7a5520"},
  {id:"coral",  hex:"#d2503a", dim:"#7a2a1a"},
  {id:"sage",   hex:"#6aaa6e", dim:"#3a603c"},
  {id:"violet", hex:"#9b6ec8", dim:"#5a3a78"},
  {id:"slate",  hex:"#8a9bb5", dim:"#445068"},
  {id:"rose",   hex:"#c86e8e", dim:"#7a3a52"},
  {id:"gold",   hex:"#d4b85a", dim:"#7a6628"},
];

let data = [];
let sel = 0;
let pvCat = "stills", pvIdx = 0;
let edTab = "project"; // "about" | "project"
const blobUrls = {};                 // path -> objectURL for local preview
let fileHandle = null;               // FileSystemFileHandle for direct save
let disciplines = [];                // [{label, color}] — global tag palette
let about = {name:"Martin Fir",bio:"",location:"Ljubljana",photo:"",email:"hello@martinfir.com",instagram:"",imdb:"",font:"default",tracking:-.02,
  bloom:1,bloomRadius:1,barrel:1,
  vignetteSize:1,vignetteDark:1,
  scanlines:1,scanlineGap:2,
  grain:1,grainSize:1};

const $ = s => document.querySelector(s);
const statusEl = $("#status");

/* ---------- File System Access API (direct save to data/projects.json) ---------- */
function openIDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open("fir_cms",1);
    req.onupgradeneeded=()=>req.result.createObjectStore("handles");
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}
async function saveHandleToIDB(h){
  try{ const db=await openIDB(); db.transaction("handles","readwrite").objectStore("handles").put(h,"projects"); }catch(e){}
}
async function loadHandleFromIDB(){
  try{
    const db=await openIDB();
    return await new Promise((res,rej)=>{
      const req=db.transaction("handles","readonly").objectStore("handles").get("projects");
      req.onsuccess=()=>res(req.result||null); req.onerror=()=>rej(req.error);
    });
  }catch(e){ return null; }
}
async function getWriteHandle(){
  if(fileHandle){
    const perm=await fileHandle.queryPermission({mode:"readwrite"});
    if(perm==="granted") return fileHandle;
    if(await fileHandle.requestPermission({mode:"readwrite"})==="granted") return fileHandle;
    fileHandle=null;
  }
  fileHandle=await window.showSaveFilePicker({
    suggestedName:"projects.json",
    types:[{description:"JSON",accept:{"application/json":[".json"]}}],
  });
  await saveHandleToIDB(fileHandle);
  return fileHandle;
}
function updateExportBtn(){
  $("#exportBtn").textContent = fileHandle ? "Save → "+fileHandle.name : "Save projects.json";
}
async function restoreHandle(){
  fileHandle=await loadHandleFromIDB();
  updateExportBtn();
}

/* ---------- load ---------- */
async function init(){
  let loaded = restore();
  // migrate old separate disc key if disciplines not loaded yet
  if(!disciplines.length){
    try{ const s=localStorage.getItem("fir_cms_disc"); if(s) disciplines=JSON.parse(s)||[]; }catch(e){}
  }
  if(!loaded){
    try{
      const r = await fetch("data/projects.json",{cache:"no-store"});
      if(r.ok){
        const j = await r.json();
        if(Array.isArray(j)){ data=j; }
        else{
          data=j.projects||[];
          if(j.disciplines) disciplines=j.disciplines.map(d=>({label:d.label,color:d.color||"teal"}));
          if(j.about) Object.assign(about,j.about);
        }
      }
    }catch(e){ /* file:// or missing */ }
  }
  if(!Array.isArray(data)) data = [];
  const initFont=FONTS.find(x=>x.id===about.font)||FONTS[0];
  const gf=document.getElementById("gfonts");
  if(initFont.url){ gf.href=initFont.url; gf.disabled=false; } else { gf.disabled=true; }
  if(about.accent) applyAccentCMS(about.accent);
  if(about.tracking!=null) document.documentElement.style.setProperty("--tracking-d", about.tracking+"em");
  const _r=document.documentElement;
  _r.style.setProperty("--bloom",          about.bloom??1);
  _r.style.setProperty("--bloom-r",        about.bloomRadius??1);
  _r.style.setProperty("--vignette-size",  about.vignetteSize??about.vignette??1);
  _r.style.setProperty("--vignette-dark",  about.vignetteDark??1);
  _r.style.setProperty("--scanlines",      about.scanlines??1);
  _r.style.setProperty("--scanline-gap",   about.scanlineGap??2);
  _r.style.setProperty("--grain",          about.grain??1);

  renderAll();

/* ---------- autosave ---------- */
function save(){
  try{ localStorage.setItem("fir_cms_draft", JSON.stringify({about,disciplines,projects:data})); }catch(e){}
  statusEl.textContent = "draft saved · " + new Date().toLocaleTimeString();
}
function restore(){
  try{
    const s = localStorage.getItem("fir_cms_draft");
    if(s){
      const d=JSON.parse(s);
      if(Array.isArray(d)){ data=d; } // legacy format
      else{
        data=d.projects||[];
        if(d.disciplines) disciplines=d.disciplines;
        if(d.about) Object.assign(about,d.about);
      }
      return true;
    }
  }catch(e){}
  return false;
}

/* ---------- helpers ---------- */
function sanitize(name){
  const dot = name.lastIndexOf(".");
  const base = (dot>=0?name.slice(0,dot):name).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");
  const ext = dot>=0 ? name.slice(dot).toLowerCase() : "";
  return base + ext;
}
function mediaThumb(m){
  if(!m) return null;
  if(m.type==="image") return m.src||null;
  if(m.type==="video") return m.poster||null;
  if(m.type==="compare") return m.after||m.before||null;
  return null;
}
function resolveSrc(path){ return blobUrls[path] || path || ""; }
function newMedia(type){
  const base = { type, cat:"stills", caption:"" };
  if(type==="image"||type==="model") base.src="";
  if(type==="video"){ base.src=""; base.poster=""; }
  if(type==="compare"){ base.before=""; base.after=""; base.labelBefore="BEFORE"; base.labelAfter="AFTER"; }
  return base;
}

function darkenHex(hex, f){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return "#"+[r,g,b].map(v=>Math.round(v*f).toString(16).padStart(2,"0")).join("");
}
function applyAccentCMS(hex){
  document.documentElement.style.setProperty("--safe", hex);
  document.documentElement.style.setProperty("--safe-dim", darkenHex(hex, .45));
}
function attachAboutHandlers(){
  const fontSel=document.getElementById("ab_font");

    const el=document.getElementById(id); if(!el) return;
    el.oninput=()=>{ about[key]=el.value; save(); };
  });
  const trackingInp=document.getElementById("ab_tracking");
  if(trackingInp) trackingInp.oninput=()=>{

    const v=about.bloom??1;

    if(!hex||hex.length<7) return;
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    document.documentElement.style.setProperty("--bloom-glow-1",`rgba(${r},${g},${b},${Math.min(1,0.55*v).toFixed(3)})`);
    document.documentElement.style.setProperty("--bloom-glow-2",`rgba(${r},${g},${b},${Math.min(1,0.20*v).toFixed(3)})`);
    document.documentElement.style.setProperty("--bloom-dot",   `rgba(${r},${g},${b},${Math.min(1,0.60*v).toFixed(3)})`);
    document.documentElement.style.setProperty("--bloom-tab",   `rgba(${r},${g},${b},${Math.min(1,0.20*v).toFixed(3)})`);
  }
  const R=document.documentElement;
  // [id, aboutKey, mul, cssVar, unit, extraApply]
  const FX=[
    ["ab_bloom",      "bloom",       100, "--bloom",          "%", ()=>cmsBloomColors()],
    ["ab_bloom_r",    "bloomRadius", 100, "--bloom-r",        "%", null],
    ["ab_barrel",     "barrel",      100, null,               "%", null],
    ["ab_vig_size",   "vignetteSize",100, "--vignette-size",  "%", null],
    ["ab_vig_dark",   "vignetteDark",100, "--vignette-dark",  "%", null],
    ["ab_scan",       "scanlines",   100, "--scanlines",      "%", null],
    ["ab_scan_gap",   "scanlineGap",   1, "--scanline-gap",   "px",null],
    ["ab_grain",      "grain",       100, "--grain",          "%", null],
    ["ab_grain_size", "grainSize",   100, "--grain-size",     "%", null],
  ];
  FX.forEach(([id,key,mul,cssVar,unit,extra])=>{
    const inp=document.getElementById(id); if(!inp) return;
    inp.oninput=()=>{
      const v=parseFloat(inp.value)/mul;
      about[key]=v;
      const lbl=document.getElementById(id+"_val");
      if(lbl) lbl.textContent=(unit==="px"?Math.round(v):Math.round(v*mul))+unit;
      if(cssVar) R.style.setProperty(cssVar,v);
      if(extra) extra();
      save();
    };
  });
  const accentInp=document.getElementById("ab_accent");
  if(accentInp) accentInp.oninput=()=>{
    about.accent=accentInp.value;
    document.getElementById("ab_accent_hex").textContent=accentInp.value;
    applyAccentCMS(accentInp.value);
    save();
  };
  const swInp=document.getElementById("ab_software");
  if(swInp) swInp.oninput=()=>{ about.software=swInp.value.split(",").map(s=>s.trim()).filter(Boolean); save(); };
  const coInp=document.getElementById("ab_companies");
  if(coInp) coInp.oninput=()=>{ about.companies=coInp.value.split(",").map(s=>s.trim()).filter(Boolean); save(); };
  const pathInp=document.getElementById("ab_photo");
  const filePick=document.getElementById("ab_photo_file");
  function updateCropCircle(src, crop){
    const circle=document.getElementById("ab_crop_circle"); if(!circle) return;
    const cx=crop&&crop.x!=null?crop.x:50, cy=crop&&crop.y!=null?crop.y:50;
    if(src){
      let img=document.getElementById("ab_crop_img");
      if(!img){ circle.innerHTML=`<img id="ab_crop_img" src="${src}" style="object-position:${cx}% ${cy}%" draggable="false">`; }
      else{ img.src=src; img.style.objectPosition=`${cx}% ${cy}%`; }
    } else {
      circle.innerHTML=`<span class="plate p1"></span>`;
    }
  }
  if(pathInp) pathInp.oninput=()=>{
    about.photo=pathInp.value;
    updateCropCircle(resolveSrc(about.photo), about.photoCrop);
    save();
  };
  if(filePick) filePick.onchange=()=>{
    const file=filePick.files[0]; if(!file) return;
    const path="img/"+sanitize(file.name);
    blobUrls[path]=URL.createObjectURL(file);
    about.photo=path; if(pathInp) pathInp.value=path;
    about.photoCrop={x:50,y:50};
    updateCropCircle(blobUrls[path], about.photoCrop);
    save();
  };

  // drag-to-crop on the circle
  (function setupCropDrag(){
    const circle=document.getElementById("ab_crop_circle"); if(!circle) return;
    let sx, sy, scx, scy;
    circle.addEventListener("pointerdown", e=>{
      if(!document.getElementById("ab_crop_img")) return;
      circle.setPointerCapture(e.pointerId);
      sx=e.clientX; sy=e.clientY;
      scx=about.photoCrop&&about.photoCrop.x!=null?about.photoCrop.x:50;
      scy=about.photoCrop&&about.photoCrop.y!=null?about.photoCrop.y:50;
      e.preventDefault();
    });
    circle.addEventListener("pointermove", e=>{
      if(!circle.hasPointerCapture(e.pointerId)) return;
      const rect=circle.getBoundingClientRect();
      const nx=Math.max(0,Math.min(100, scx-(e.clientX-sx)/rect.width*100));
      const ny=Math.max(0,Math.min(100, scy-(e.clientY-sy)/rect.height*100));
      about.photoCrop={x:nx, y:ny};
      const img=document.getElementById("ab_crop_img");
      if(img) img.style.objectPosition=`${nx}% ${ny}%`;
      save();
    });
    circle.addEventListener("pointerup", e=>{ circle.releasePointerCapture(e.pointerId); });
  })();
}

    `;
    // header buttons
    d.querySelector('[data-act="up"]').onclick   = ()=>{ if(i>0){ swap(p.media,i,i-1); renderAll(); } };
    d.querySelector('[data-act="down"]').onclick = ()=>{ if(i<p.media.length-1){ swap(p.media,i,i+1); renderAll(); } };
    d.querySelector('[data-act="del"]').onclick  = ()=>{ p.media.splice(i,1); renderAll(); };
    // selects + caption
    d.querySelectorAll("[data-k]").forEach(inp=>{
      inp.oninput = ()=>{
        const k=inp.dataset.k;
        if(k==="type"){ const keep={cat:m.cat,caption:m.caption}; const nm=newMedia(inp.value); Object.assign(nm,keep); p.media[i]=nm; renderAll(); return; }
        m[k]=inp.value; renderProjects(); renderPreview(); save();
      };
    });
    // file pickers
    d.querySelectorAll('input[type=file]').forEach(fi=>{
      fi.onchange = ()=> handlePick(fi, m);
    });
    // frame picker
    d.querySelectorAll('.fp-btn').forEach(btn=>{ btn.onclick=()=>openFramePicker(m); });
    dragReorder(d, "media", p.media, i);
    wrap.appendChild(d);
  });
}

/* ---- frame picker ---- */
async function openFramePicker(m){
  document.getElementById("fp-modal")?.remove();
  const rawSrc=blobUrls[m.src]||m.src; if(!rawSrc){ alert("Set or pick the video file first."); return; }

  // Need a blob URL — canvas.drawImage taints if src is a plain server path
  let src=rawSrc;
  if(!rawSrc.startsWith("blob:")&&!rawSrc.startsWith("data:")){
    // Show loading screen while we fetch the file into a blob
    const loading=document.createElement("div");
    loading.id="fp-modal";
    loading.style.cssText="position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;font-family:'IBM Plex Mono',monospace";
    loading.innerHTML=`<div style="font-size:.55rem;letter-spacing:.24em;text-transform:uppercase;color:#8a8880">Loading video for capture…</div>
      <div id="fp-load-info" style="font-size:.5rem;color:#55534d"></div>`;
    document.body.appendChild(loading);
    try{
      const r=await fetch(rawSrc);
      if(!r.ok) throw new Error("HTTP "+r.status);
      const blob=await r.blob();
      document.getElementById("fp-load-info").textContent=(blob.size/1024/1024).toFixed(1)+" MB loaded";
      src=URL.createObjectURL(blob);
      loading.remove();
    }catch(e){
      loading.remove();
      alert("Could not load video for capture.\n\nUse the Pick button to select the video file first, then open the frame picker.\n\n("+e.message+")");
      return;
    }
  }
  const ov=document.createElement("div");
  ov.id="fp-modal";
  ov.style.cssText="position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:2rem;font-family:'IBM Plex Mono',monospace";
  ov.innerHTML=`
    <div style="font-size:.55rem;letter-spacing:.24em;text-transform:uppercase;color:#8a8880">Scrub to frame → Capture as poster</div>
    <video id="fp-vid" style="max-width:min(860px,90vw);max-height:55vh;background:#000;display:block" preload="auto" muted playsinline></video>
    <div style="width:min(860px,90vw);display:flex;gap:.7rem;align-items:center">
      <input type="range" id="fp-scrub" min="0" max="1000" step="1" value="0"
        style="flex:1;accent-color:#34b3bd;cursor:pointer">
      <span id="fp-time" style="color:#55534d;font-size:.6rem;min-width:48px;text-align:right">0.0s</span>
    </div>
    <div style="display:flex;gap:.5rem">
      <button id="fp-capture" style="font:inherit;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;padding:.45rem 1rem;background:#11201f;border:1px solid #34b3bd;color:#34b3bd;cursor:pointer;border-radius:3px">Capture frame</button>
      <button id="fp-cancel"  style="font:inherit;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;padding:.45rem 1rem;background:#0e0e10;border:1px solid #232327;color:#8a8880;cursor:pointer;border-radius:3px">Cancel</button>
    </div>`;
  document.body.appendChild(ov);
  const vid=document.getElementById("fp-vid");
  vid.src=src;
  const scrub=document.getElementById("fp-scrub");
  const timeEl=document.getElementById("fp-time");
  vid.addEventListener("loadedmetadata",()=>{ scrub.max=Math.round(vid.duration*100); });
  scrub.addEventListener("input",()=>{
    const t=parseFloat(scrub.value)/100;
    vid.currentTime=t;
    timeEl.textContent=t.toFixed(1)+"s";
  });
  document.getElementById("fp-cancel").onclick=()=>ov.remove();
  document.getElementById("fp-capture").onclick=()=>{
    const btn=document.getElementById("fp-capture");
    btn.textContent="Capturing…"; btn.disabled=true;
    function doCapture(){
      try{
        const c=document.createElement("canvas");
        c.width=vid.videoWidth||1920; c.height=vid.videoHeight||1080;
        c.getContext("2d").drawImage(vid,0,0,c.width,c.height);
        const dataUrl=c.toDataURL("image/jpeg",0.85);
        const base=(m.src||"video/clip").replace(/\.[^.]+$/,"");
        const path=base+"-poster.jpg";
        blobUrls[path]=dataUrl;
        m.poster=path;
        ov.remove();
        renderAll();
      }catch(e){ btn.textContent="Capture frame"; btn.disabled=false; alert("Capture failed: "+e.message); }
    }
    const t=vid.currentTime;
    vid.pause();
    vid.addEventListener("seeked", doCapture, {once:true});
    vid.currentTime=t;
  };
}

/* type-specific path + file inputs */
function mediaFields(m,i){
  const pickRow = (key,label,folder,accept) => `
    <div class="field">
      <label>${label}</label>
      <div class="pick">
        <input class="path" type="text" data-k="${key}" value="${esc(m[key])}" placeholder="${folder}/filename">
        <label class="filebtn">Pick<input type="file" data-target="${key}" data-folder="${folder}" accept="${accept||(folder==='video'?'video/*':folder==='models'?'.glb,.gltf':'image/*')}"></label>
      </div>
      <div class="hint" data-hint="${key}"></div>
    </div>`;
  if(m.type==="image")  return pickRow("src","Image file","img");
  if(m.type==="model")  return pickRow("src","Model file (GLB)","models");
  if(m.type==="video")  return pickRow("src","Video file","video")
    + pickRow("poster","Cover image (poster)","video","image/*")
    + `<button class="fp-btn" style="margin-top:.3rem;width:100%;font-size:.55rem;letter-spacing:.16em" data-fpick="${i}">⬡ Pick frame from video</button>`;
  if(m.type==="compare")
    return pickRow("after","After (e.g. final comp)","img")
         + pickRow("before","Before (e.g. greenscreen plate)","img")
         + `<div class="row2">
              <div class="field"><label>Label · after</label><input type="text" data-k="labelAfter" value="${esc(m.labelAfter)}"></div>
              <div class="field"><label>Label · before</label><input type="text" data-k="labelBefore" value="${esc(m.labelBefore)}"></div>
            </div>`;
  return "";
}

/* picking a local file: preview now, suggest a repo path to save it as */
function handlePick(fi, m){
  const file = fi.files[0]; if(!file) return;
  const key = fi.dataset.target, folder = fi.dataset.folder;
  const path = folder + "/" + sanitize(file.name);
  blobUrls[path] = URL.createObjectURL(file);   // live preview source
  m[key] = path;                                 // committed relative path
  renderAll();
}

/* ---------- live preview (mirrors site viewer) ---------- */
function renderPreview(){
  const el = $("#preview");
  if(!data.length || !data[sel]){ el.innerHTML='<div class="empty">Nothing to preview.</div>'; return; }
  const p = data[sel];
  const inCat = (p.media||[]).filter(m=>m.cat===pvCat);
  if(pvIdx>=inCat.length) pvIdx=0;
  const m = inCat[pvIdx];

  el.innerHTML = `
    <div class="vhead">
      <div><div class="vtitle">${esc(p.title)||"—"}</div><div class="vsub">${esc(p.role)}</div></div>
      <div class="vyear">${esc(p.code)} / ${esc(p.year)}</div>
    </div>
    <div class="vmain" id="pvMain"></div>
    <div class="tabs">${CATS.map(c=>{
      const n=(p.media||[]).filter(x=>x.cat===c[0]).length;
      return `<button class="btn tab${c[0]===pvCat?' active':''}" data-cat="${c[0]}"${n?'':' disabled'}>${c[1]} ${String(n).padStart(2,'0')}</button>`;
    }).join("")}</div>
    <div class="strip" id="pvStrip"></div>
    ${filesNote()}
  `;
  el.querySelectorAll("[data-cat]").forEach(b=> b.onclick=()=>{ pvCat=b.dataset.cat; pvIdx=0; renderPreview(); });

  // strip
  const strip = $("#pvStrip");
  inCat.forEach((mm,idx)=>{
    const ts = resolveSrc(mediaThumb(mm));
    const badge = mm.type==="model"?"3D":mm.type==="video"?"▶":mm.type==="compare"?"⇄":"";
    const t=document.createElement("div");
    t.className="th"+(idx===pvIdx?" active":"");
    t.innerHTML = (ts?`<img src="${ts}">`:`<span class="plate ${mm.type==='compare'?'green':'neutral'}"></span>`)+(badge?`<span class="b">${badge}</span>`:"");
    t.onclick=()=>{ pvIdx=idx; renderPreview(); };
    strip.appendChild(t);
  });

  paintPreviewMain(m);
}

function paintPreviewMain(m){
  const main = $("#pvMain"); if(!main) return;
  if(!m){ main.innerHTML='<span class="plate neutral"></span>'; return; }
  const cap = m.caption?`<span class="vcap">${esc(m.caption)}</span>`:"";
  if(m.type==="image"){
    const s=resolveSrc(m.src);
    main.innerHTML=(s?`<img src="${s}">`:`<span class="plate neutral"></span>`)+cap;
  }else if(m.type==="video"){
    const s=resolveSrc(m.src), ps=resolveSrc(m.poster);
    main.innerHTML=(s?`<video src="${s}"${ps?` poster="${ps}"`:""} autoplay muted loop playsinline controls></video>`
                     :`<span class="plate neutral"></span>`)+cap;
  }else if(m.type==="model"){
    main.innerHTML=`<span class="plate neutral"></span><span class="vcap">3D · ${esc(m.src)||"no file"} (loads on the live site)</span>`;
  }else if(m.type==="compare"){
    const before=resolveSrc(m.before), after=resolveSrc(m.after);
    main.classList.add("cmp");
    main.innerHTML=`
      ${before?`<img src="${before}">`:`<span class="plate green"></span>`}
      <div class="layer" id="pvLayer">${after?`<img src="${after}">`:`<span class="plate neutral"></span>`}</div>
      <div class="line" id="pvLine"><div class="grip">⇆</div></div>
      <span class="ct l">${esc(m.labelAfter)||"AFTER"}</span>
      <span class="ct r">${esc(m.labelBefore)||"BEFORE"}</span>${cap}`;
    const layer=$("#pvLayer"), line=$("#pvLine"); let drag=false;
    const set=v=>{ v=Math.max(0,Math.min(100,v)); layer.style.clipPath=`inset(0 ${100-v}% 0 0)`; line.style.left=v+"%"; };
    const from=e=>{ const r=main.getBoundingClientRect(); set(((e.clientX)-r.left)/r.width*100); };
    main.onpointerdown=e=>{ drag=true; main.setPointerCapture(e.pointerId); from(e); };
    main.onpointermove=e=>{ if(drag) from(e); };
    main.onpointerup=()=>drag=false;
    set(50);
    return;
  }
  main.classList.remove("cmp");
}

/* checklist of local files still to drop into the repo */
function filesNote(){
  const items=[];
  if(about.photo && blobUrls[about.photo]) items.push(about.photo);
  data.forEach(p=>(p.media||[]).forEach(m=>{
    ["src","poster","before","after"].forEach(k=>{
      if(m[k] && blobUrls[m[k]]) items.push(m[k]);
    });
  }));
  if(!items.length) return "";
  const uniq=[...new Set(items)];
  return `<div class="files-note"><h3>Files to place in repo</h3><ul>
    ${uniq.map(p=>`<li><code>${p}</code><span>copy here & commit</span></li>`).join("")}
  </ul></div>`;
}

/* ---------- generic drag reorder ---------- */
function dragReorder(node, cls, arr, idx){
  node.addEventListener("dragstart",e=>{ e.dataTransfer.setData("text/plain",idx); e.dataTransfer.effectAllowed="move"; });
  node.addEventListener("dragover",e=>{ e.preventDefault();
    const r=node.getBoundingClientRect(); const below=(e.clientY-r.top)>r.height/2;
    node.classList.toggle("drop-below",below); node.classList.toggle("drop-above",!below);
  });
  node.addEventListener("dragleave",()=>{ node.classList.remove("drop-above","drop-below"); });
  node.addEventListener("drop",e=>{
    e.preventDefault();
    const from=+e.dataTransfer.getData("text/plain"); let to=idx;
    const r=node.getBoundingClientRect(); if((e.clientY-r.top)>r.height/2) to=idx+1;
    if(from<to) to--;
    if(from===to||isNaN(from)){ node.classList.remove("drop-above","drop-below"); return; }
    const [moved]=arr.splice(from,1); arr.splice(to,0,moved);
    if(cls==="pitem"){ if(sel===from) sel=to; else if(from<sel&&to>=sel) sel--; else if(from>sel&&to<=sel) sel++; }
    renderAll();
  });
}

/* ---------- utils ---------- */
function esc(v){ return (v==null?"":String(v)).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function swap(a,i,j){ const t=a[i]; a[i]=a[j]; a[j]=t; }
function clean(){
  const disciplinesOut=disciplines.map(d=>{ const c=colorFor(d.color); return {label:d.label,color:d.color,hex:c.hex,dim:c.dim}; });
  return JSON.stringify({about,disciplines:disciplinesOut,projects:data},null,2);
}

/* ---------- toolbar ---------- */
$("#addProj").onclick = ()=>{
  const n=data.length+1;
  data.push({ code:String(n).padStart(3,"0"), title:"New Project", role:"", year:String(new Date().getFullYear()), description:"", media:[] });
  sel=data.length-1; pvCat="stills"; pvIdx=0; renderAll();
};
$("#exportBtn").onclick = async ()=>{
  if(!window.showSaveFilePicker){
    // fallback for browsers without File System Access API
    const blob=new Blob([clean()],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="projects.json"; a.click();
    return;
  }
  try{
    const h=await getWriteHandle();
    const w=await h.createWritable();
    await w.write(clean());
    await w.close();
    updateExportBtn();
    statusEl.textContent="saved · "+new Date().toLocaleTimeString();
  }catch(e){
    if(e.name!=="AbortError") statusEl.textContent="save failed — "+e.message;
  }
};
$("#copyBtn").onclick = async ()=>{
  try{ await navigator.clipboard.writeText(clean()); statusEl.textContent="JSON copied to clipboard"; }
  catch(e){ statusEl.textContent="copy failed — use Export"; }
};
$("#resetBtn").onclick = ()=>{
  if(confirm("Discard the local draft and reload data/projects.json?")){
    try{ localStorage.removeItem("fir_cms_draft"); }catch(e){}
    data=[]; sel=0; init();
  }
};
$("#loadFile").onchange = (e)=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ data=JSON.parse(rd.result); sel=0; pvCat="stills"; pvIdx=0; renderAll(); }catch(err){ alert("Not valid JSON"); } };
  rd.readAsText(f);
};

init();
</script>
